name: Reporte Semanal Workflow IT

on:
  schedule:
    - cron: '0 11 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generar-reporte:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar reporte
        env:
          SN_BASE_URL:        ${{ secrets.SN_BASE_URL }}
          SN_USERNAME:        ${{ secrets.SN_USERNAME }}
          SN_PASSWORD:        ${{ secrets.SN_PASSWORD }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          SENDGRID_API_KEY:   ${{ secrets.SENDGRID_API_KEY }}
          EMAIL_SENDER:       ${{ secrets.EMAIL_SENDER }}
          EMAIL_RECIPIENTS:   ${{ secrets.EMAIL_RECIPIENTS }}
          GITHUB_REPO:        ${{ github.repository }}
        run: python main.py

      - name: Preparar carpeta para GitHub Pages
        run: |
          mkdir -p ./docs
          cp reporte_semanal.html ./docs/index.html

      - name: Publicar en GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages

      - name: Guardar como artefacto (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reporte-semanal
          path: reporte_semanal.html
          retention-days: 30

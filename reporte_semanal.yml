name: Reporte Semanal Workflow IT

on:
  # Ejecutar cada lunes a las 8:00 AM hora de Chile (11:00 UTC)
  schedule:
    - cron: '0 11 * * 1'

  # También permite correrlo manualmente desde GitHub si lo necesitas
  workflow_dispatch:

jobs:
  generar-reporte:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar reporte
        env:
          # Credenciales de ServiceNow
          SN_BASE_URL:        ${{ secrets.SN_BASE_URL }}
          SN_USERNAME:        ${{ secrets.SN_USERNAME }}
          SN_PASSWORD:        ${{ secrets.SN_PASSWORD }}
          # API de Claude
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          # Correo
          EMAIL_SENDER:       ${{ secrets.EMAIL_SENDER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENTS:   ${{ secrets.EMAIL_RECIPIENTS }}
        run: python main.py

      - name: Guardar reporte como artefacto (opcional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reporte-semanal
          path: reporte_semanal.html
          retention-days: 30
